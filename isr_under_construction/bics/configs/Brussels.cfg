!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Brussels
!
!
interface Fa2/1
 ip address 10.0.0.17 255.255.255.254
 description "To Rotterdam"
 speed auto
 duplex auto
!
interface Fa1/1
 ip address 10.0.0.45 255.255.255.254
 description "To Luxembourg"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.52 255.255.255.254
 description "To Frankfurt"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.0.54 255.255.255.254
 description "To Amsterdam"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.56 255.255.255.254
 description "To London"
 speed auto
 duplex auto
!
interface Fa2/0
 ip address 10.0.0.58 255.255.255.254
 description "To Paris"
 speed auto
 duplex auto
!
!
!
!
!
!
!
!
route-map RMap_Brussels_from_Amsterdam deny 10
 match ip next-hop 10.0.0.9
 set local-preference 1
 set community 100:0 additive
route-map RMap_Brussels_from_Amsterdam deny 100
!
route-map RMap_Brussels_from_Frankfurt deny 10
 match ip next-hop 10.0.0.53
 set local-preference 1
 set community 100:0 additive
route-map RMap_Brussels_from_Frankfurt deny 100
!
route-map RMap_Brussels_from_London deny 10
 match ip next-hop 10.0.0.9
 set local-preference 1
 set community 100:0 additive
route-map RMap_Brussels_from_London deny 100
!
!
router bgp 60
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.55 remote-as 10
 neighbor 10.0.0.55 description "To Amsterdam"
 neighbor 10.0.0.55 advertisement-interval 0
 neighbor 10.0.0.55 soft-reconfiguration inbound
 neighbor 10.0.0.55 send-community
 neighbor 10.0.0.55 route-map RMap_Brussels_from_Amsterdam in
 neighbor 10.0.0.53 remote-as 100
 neighbor 10.0.0.53 description "To Frankfurt"
 neighbor 10.0.0.53 advertisement-interval 0
 neighbor 10.0.0.53 soft-reconfiguration inbound
 neighbor 10.0.0.53 send-community
 neighbor 10.0.0.53 route-map RMap_Brussels_from_Frankfurt in
 neighbor 10.0.0.57 remote-as 160
 neighbor 10.0.0.57 description "To London"
 neighbor 10.0.0.57 advertisement-interval 0
 neighbor 10.0.0.57 soft-reconfiguration inbound
 neighbor 10.0.0.57 send-community
 neighbor 10.0.0.57 route-map RMap_Brussels_from_London in
 neighbor 10.0.0.44 remote-as 170
 neighbor 10.0.0.44 description "To Luxembourg"
 neighbor 10.0.0.44 advertisement-interval 0
 neighbor 10.0.0.44 soft-reconfiguration inbound
 neighbor 10.0.0.44 send-community
 neighbor 10.0.0.59 remote-as 220
 neighbor 10.0.0.59 description "To Paris"
 neighbor 10.0.0.59 advertisement-interval 0
 neighbor 10.0.0.59 soft-reconfiguration inbound
 neighbor 10.0.0.59 send-community
 neighbor 10.0.0.16 remote-as 250
 neighbor 10.0.0.16 description "To Rotterdam"
 neighbor 10.0.0.16 advertisement-interval 0
 neighbor 10.0.0.16 soft-reconfiguration inbound
 neighbor 10.0.0.16 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
