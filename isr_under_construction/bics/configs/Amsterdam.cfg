!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Amsterdam
!
!
interface Fa1/1
 ip address 10.0.0.15 255.255.255.254
 description "To Rotterdam"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.0.55 255.255.255.254
 description "To Brussels"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.71 255.255.255.254
 description "To Frankfurt"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.76 255.255.255.254
 description "To London"
 speed auto
 duplex auto
!
!
!
!
!
!
!
!
router bgp 10
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.54 remote-as 60
 neighbor 10.0.0.54 description "To Brussels"
 neighbor 10.0.0.54 advertisement-interval 0
 neighbor 10.0.0.54 soft-reconfiguration inbound
 neighbor 10.0.0.54 send-community
 neighbor 10.0.0.70 remote-as 100
 neighbor 10.0.0.70 description "To Frankfurt"
 neighbor 10.0.0.70 advertisement-interval 0
 neighbor 10.0.0.70 soft-reconfiguration inbound
 neighbor 10.0.0.70 send-community
 neighbor 10.0.0.77 remote-as 160
 neighbor 10.0.0.77 description "To London"
 neighbor 10.0.0.77 advertisement-interval 0
 neighbor 10.0.0.77 soft-reconfiguration inbound
 neighbor 10.0.0.77 send-community
 neighbor 10.0.0.14 remote-as 250
 neighbor 10.0.0.14 description "To Rotterdam"
 neighbor 10.0.0.14 advertisement-interval 0
 neighbor 10.0.0.14 soft-reconfiguration inbound
 neighbor 10.0.0.14 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
