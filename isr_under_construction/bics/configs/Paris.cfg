!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Paris
!
!
interface Fa0/0
 ip address 10.0.0.59 255.255.255.254
 description "To Brussels"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.63 255.255.255.254
 description "To Geneva"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.83 255.255.255.254
 description "To London"
 speed auto
 duplex auto
!
interface Fa1/1
 ip address 10.0.0.84 255.255.255.254
 description "To Lyon"
 speed auto
 duplex auto
!
interface Fa2/0
 ip address 10.0.0.86 255.255.255.254
 description "To Madrid"
 speed auto
 duplex auto
!
!
ip community-list 3 permit 100:0 100:0 100:0
!
!
!
!
!
route-map RMap_Paris_from_London deny 10
 match community 3
 set local-preference 1
 set community 100:0 additive
route-map RMap_Paris_from_London deny 100
!
!
router bgp 220
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.58 remote-as 60
 neighbor 10.0.0.58 description "To Brussels"
 neighbor 10.0.0.58 advertisement-interval 0
 neighbor 10.0.0.58 soft-reconfiguration inbound
 neighbor 10.0.0.58 send-community
 neighbor 10.0.0.62 remote-as 110
 neighbor 10.0.0.62 description "To Geneva"
 neighbor 10.0.0.62 advertisement-interval 0
 neighbor 10.0.0.62 soft-reconfiguration inbound
 neighbor 10.0.0.62 send-community
 neighbor 10.0.0.82 remote-as 160
 neighbor 10.0.0.82 description "To London"
 neighbor 10.0.0.82 advertisement-interval 0
 neighbor 10.0.0.82 soft-reconfiguration inbound
 neighbor 10.0.0.82 send-community
 neighbor 10.0.0.82 route-map RMap_Paris_from_London in
 neighbor 10.0.0.85 remote-as 180
 neighbor 10.0.0.85 description "To Lyon"
 neighbor 10.0.0.85 advertisement-interval 0
 neighbor 10.0.0.85 soft-reconfiguration inbound
 neighbor 10.0.0.85 send-community
 neighbor 10.0.0.87 remote-as 190
 neighbor 10.0.0.87 description "To Madrid"
 neighbor 10.0.0.87 advertisement-interval 0
 neighbor 10.0.0.87 soft-reconfiguration inbound
 neighbor 10.0.0.87 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
