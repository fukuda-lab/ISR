!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Lyon
!
!
interface Fa0/0
 ip address 10.0.0.65 255.255.255.254
 description "To Geneva"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.85 255.255.255.254
 description "To Paris"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.97 255.255.255.254
 description "To Marseille"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 180
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.64 remote-as 110
 neighbor 10.0.0.64 description "To Geneva"
 neighbor 10.0.0.64 advertisement-interval 0
 neighbor 10.0.0.64 soft-reconfiguration inbound
 neighbor 10.0.0.64 send-community
 neighbor 10.0.0.96 remote-as 200
 neighbor 10.0.0.96 description "To Marseille"
 neighbor 10.0.0.96 advertisement-interval 0
 neighbor 10.0.0.96 soft-reconfiguration inbound
 neighbor 10.0.0.96 send-community
 neighbor 10.0.0.84 remote-as 220
 neighbor 10.0.0.84 description "To Paris"
 neighbor 10.0.0.84 advertisement-interval 0
 neighbor 10.0.0.84 soft-reconfiguration inbound
 neighbor 10.0.0.84 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
