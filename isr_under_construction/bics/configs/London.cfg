!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname London
!
!
interface Fa0/1
 ip address 10.0.0.57 255.255.255.254
 description "To Brussels"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.0.77 255.255.255.254
 description "To Amsterdam"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.78 255.255.255.254
 description "To Dublin"
 speed auto
 duplex auto
!
interface Fa1/1
 ip address 10.0.0.80 255.255.255.254
 description "To Lisbon"
 speed auto
 duplex auto
!
interface Fa2/0
 ip address 10.0.0.82 255.255.255.254
 description "To Paris"
 speed auto
 duplex auto
!
!
!
!
!
!
!
!
!
router bgp 160
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.76 remote-as 10
 neighbor 10.0.0.76 description "To Amsterdam"
 neighbor 10.0.0.76 advertisement-interval 0
 neighbor 10.0.0.76 soft-reconfiguration inbound
 neighbor 10.0.0.76 send-community
 neighbor 10.0.0.56 remote-as 60
 neighbor 10.0.0.56 description "To Brussels"
 neighbor 10.0.0.56 advertisement-interval 0
 neighbor 10.0.0.56 soft-reconfiguration inbound
 neighbor 10.0.0.56 send-community
 neighbor 10.0.0.79 remote-as 90
 neighbor 10.0.0.79 description "To Dublin"
 neighbor 10.0.0.79 advertisement-interval 0
 neighbor 10.0.0.79 soft-reconfiguration inbound
 neighbor 10.0.0.79 send-community
 neighbor 10.0.0.81 remote-as 140
 neighbor 10.0.0.81 description "To Lisbon"
 neighbor 10.0.0.81 advertisement-interval 0
 neighbor 10.0.0.81 soft-reconfiguration inbound
 neighbor 10.0.0.81 send-community
 neighbor 10.0.0.83 remote-as 220
 neighbor 10.0.0.83 description "To Paris"
 neighbor 10.0.0.83 advertisement-interval 0
 neighbor 10.0.0.83 soft-reconfiguration inbound
 neighbor 10.0.0.83 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
