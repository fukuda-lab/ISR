!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Aarhus
!
!
interface Fa0/0
 ip address 10.0.0.149 255.255.255.254
 description "To Copenhagen"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.153 255.255.255.254
 description "To Hamburg"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.158 255.255.255.254
 description "To Kolding"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 10
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.148 remote-as 360
 neighbor 10.0.0.148 description "To Copenhagen"
 neighbor 10.0.0.148 advertisement-interval 0
 neighbor 10.0.0.148 soft-reconfiguration inbound
 neighbor 10.0.0.148 send-community
 neighbor 10.0.0.152 remote-as 570
 neighbor 10.0.0.152 description "To Hamburg"
 neighbor 10.0.0.152 advertisement-interval 0
 neighbor 10.0.0.152 soft-reconfiguration inbound
 neighbor 10.0.0.152 send-community
 neighbor 10.0.0.159 remote-as 650
 neighbor 10.0.0.159 description "To Kolding"
 neighbor 10.0.0.159 advertisement-interval 0
 neighbor 10.0.0.159 soft-reconfiguration inbound
 neighbor 10.0.0.159 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
