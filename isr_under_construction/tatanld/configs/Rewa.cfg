!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Rewa
!
!
interface Fa0/0
 ip address 10.0.0.25 255.255.255.254
 description "To Allahabad"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.47 255.255.255.254
 description "To Satna"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.54 255.255.255.254
 description "To PeerRewa_0"
 speed auto
 duplex auto
!
!
!
!
!
!
route-map RMap_Rewa_from_PeerRewa_0 permit 10
 set community 100:0 additive
!
!
router bgp 1130
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.24 remote-as 60
 neighbor 10.0.0.24 description "To Allahabad"
 neighbor 10.0.0.24 advertisement-interval 0
 neighbor 10.0.0.24 soft-reconfiguration inbound
 neighbor 10.0.0.24 send-community
 neighbor 10.0.0.55 remote-as 10010
 neighbor 10.0.0.55 description "To PeerRewa_0"
 neighbor 10.0.0.55 advertisement-interval 0
 neighbor 10.0.0.55 soft-reconfiguration inbound
 neighbor 10.0.0.55 send-community
 neighbor 10.0.0.55 route-map RMap_Rewa_from_PeerRewa_0 in
 neighbor 10.0.0.46 remote-as 1210
 neighbor 10.0.0.46 description "To Satna"
 neighbor 10.0.0.46 advertisement-interval 0
 neighbor 10.0.0.46 soft-reconfiguration inbound
 neighbor 10.0.0.46 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
