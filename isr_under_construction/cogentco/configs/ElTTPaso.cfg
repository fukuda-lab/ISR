!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname ElTTPaso
!
!
interface Fa1/0
 ip address 10.0.0.189 255.255.255.254
 description "To SanTTAntonio"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.1.71 255.255.255.254
 description "To Phoenix"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.1.107 255.255.255.254
 description "To Albuquerque"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 550
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.1.106 remote-as 20
 neighbor 10.0.1.106 description "To Albuquerque"
 neighbor 10.0.1.106 advertisement-interval 0
 neighbor 10.0.1.106 soft-reconfiguration inbound
 neighbor 10.0.1.106 send-community
 neighbor 10.0.1.70 remote-as 1460
 neighbor 10.0.1.70 description "To Phoenix"
 neighbor 10.0.1.70 advertisement-interval 0
 neighbor 10.0.1.70 soft-reconfiguration inbound
 neighbor 10.0.1.70 send-community
 neighbor 10.0.0.188 remote-as 1620
 neighbor 10.0.0.188 description "To SanTTAntonio"
 neighbor 10.0.0.188 advertisement-interval 0
 neighbor 10.0.0.188 soft-reconfiguration inbound
 neighbor 10.0.0.188 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
