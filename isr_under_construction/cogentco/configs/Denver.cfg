!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Denver
!
!
interface Fa0/1
 ip address 10.0.0.61 255.255.255.254
 description "To KansasTTCity"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.1.65 255.255.255.254
 description "To SaltTTLakeTTCity"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.1.110 255.255.255.254
 description "To ColoradoTTSprings"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 460
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.1.111 remote-as 400
 neighbor 10.0.1.111 description "To ColoradoTTSprings"
 neighbor 10.0.1.111 advertisement-interval 0
 neighbor 10.0.1.111 soft-reconfiguration inbound
 neighbor 10.0.1.111 send-community
 neighbor 10.0.0.60 remote-as 780
 neighbor 10.0.0.60 description "To KansasTTCity"
 neighbor 10.0.0.60 advertisement-interval 0
 neighbor 10.0.0.60 soft-reconfiguration inbound
 neighbor 10.0.0.60 send-community
 neighbor 10.0.1.64 remote-as 1610
 neighbor 10.0.1.64 description "To SaltTTLakeTTCity"
 neighbor 10.0.1.64 advertisement-interval 0
 neighbor 10.0.1.64 soft-reconfiguration inbound
 neighbor 10.0.1.64 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
