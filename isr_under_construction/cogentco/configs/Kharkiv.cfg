!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Kharkiv
!
!
interface Fa0/0
 ip address 10.0.1.224 255.255.255.254
 description "To Kiev"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 800
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.1.225 remote-as 810
 neighbor 10.0.1.225 description "To Kiev"
 neighbor 10.0.1.225 advertisement-interval 0
 neighbor 10.0.1.225 soft-reconfiguration inbound
 neighbor 10.0.1.225 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
