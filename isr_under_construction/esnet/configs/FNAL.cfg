!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname FNAL
!
!
interface Fa0/1
 ip address 10.0.0.13 255.255.255.254
 description "To CHISL"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.0.31 255.255.255.254
 description "To ANL"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 230
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.30 remote-as 40
 neighbor 10.0.0.30 description "To ANL"
 neighbor 10.0.0.30 advertisement-interval 0
 neighbor 10.0.0.30 soft-reconfiguration inbound
 neighbor 10.0.0.30 send-community
 neighbor 10.0.0.12 remote-as 150
 neighbor 10.0.0.12 description "To CHISL"
 neighbor 10.0.0.12 advertisement-interval 0
 neighbor 10.0.0.12 soft-reconfiguration inbound
 neighbor 10.0.0.12 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
