!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname StTTMartin
!
!
interface Fa0/0
 ip address 10.0.0.35 255.255.255.254
 description "To NodeID8"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.145 255.255.255.254
 description "To StTTKittsTT&TTNevis"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.146 255.255.255.254
 description "To PuertoTTRico"
 speed auto
 duplex auto
!
!
!
!
!
!
router bgp 640
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.34 remote-as 580
 neighbor 10.0.0.34 description "To NodeID8"
 neighbor 10.0.0.34 advertisement-interval 0
 neighbor 10.0.0.34 soft-reconfiguration inbound
 neighbor 10.0.0.34 send-community
 neighbor 10.0.0.147 remote-as 610
 neighbor 10.0.0.147 description "To PuertoTTRico"
 neighbor 10.0.0.147 advertisement-interval 0
 neighbor 10.0.0.147 soft-reconfiguration inbound
 neighbor 10.0.0.147 send-community
 neighbor 10.0.0.144 remote-as 630
 neighbor 10.0.0.144 description "To StTTKittsTT&TTNevis"
 neighbor 10.0.0.144 advertisement-interval 0
 neighbor 10.0.0.144 soft-reconfiguration inbound
 neighbor 10.0.0.144 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
