!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname CaymanTTIslands
!
!
interface Fa0/0
 ip address 10.0.0.134 255.255.255.254
 description "To NodeID46"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.136 255.255.255.254
 description "To PeerCaymanTTIslands_0"
 speed auto
 duplex auto
!
!
!
!
!
!
route-map RMap_CaymanTTIslands_from_PeerCaymanTTIslands_0 permit 10
 set community 100:0 additive
!
!
router bgp 60
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.135 remote-as 460
 neighbor 10.0.0.135 description "To NodeID46"
 neighbor 10.0.0.135 advertisement-interval 0
 neighbor 10.0.0.135 soft-reconfiguration inbound
 neighbor 10.0.0.135 send-community
 neighbor 10.0.0.137 remote-as 10010
 neighbor 10.0.0.137 description "To PeerCaymanTTIslands_0"
 neighbor 10.0.0.137 advertisement-interval 0
 neighbor 10.0.0.137 soft-reconfiguration inbound
 neighbor 10.0.0.137 send-community
 neighbor 10.0.0.137 route-map RMap_CaymanTTIslands_from_PeerCaymanTTIslands_0 in
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
